<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>IPL Mega Auction Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --gold: #D4AF37; --neon-red: #ff073a; --text-main: #f8fafc; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding-top: 80px; }
        .navbar { position: fixed; top: 0; width: 100%; background: #141414; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; padding: 15px 30px; box-sizing: border-box; z-index: 1000; }
        .container { max-width: 600px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 12px; border-top: 3px solid var(--neon-red); }
        button { background: var(--gold); color: #000; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none !important; }
        .host-panel { background: #3a1111; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; }
        .player-avatar { width: 160px; height: 160px; border-radius: 10px; border: 3px solid var(--gold); }
    </style>
</head>
<body>
<nav class="navbar"><div style="color:var(--gold); font-weight:800;">🏏 PRO AUCTION</div><div id="nav-stats" class="hidden">Room: <span id="nav-code" style="color:var(--gold);"></span> | ₹<span id="nav-purse" style="color:var(--neon-red);"></span> Cr</div></nav>

<div class="container" id="home-screen">
    <h1>AUCTION SETUP</h1>
    <select id="format-select" style="width:100%; padding:10px; margin-bottom:15px;">
        <option value="T20">T20 Mega Auction</option>
        <option value="ODI">ODI World Cup Draft</option>
        <option value="Test">Test Championship</option>
    </select>
    <input type="number" id="purse-input" value="100" style="width:100px; padding:10px;"> Cr Purse<br><br>
    <button id="create-btn">Host Auction</button>
    <hr><input type="text" id="join-input" placeholder="Room Code"> <button id="join-btn">Join</button>
</div>

<div class="container hidden" id="auction-screen">
    <div id="host-controls" class="host-panel hidden">
        <button id="pause-btn">⏸ Pause</button><button id="resume-btn" class="hidden">▶ Resume</button><button id="undo-btn">⏪ Undo</button>
    </div>
    <div style="background:#222; padding:20px; border-radius:10px;">
        <img id="player-img" class="player-avatar" src="" referrerpolicy="no-referrer">
        <h2 id="p-name"></h2><p id="p-info"></p>
        <h3 style="color:var(--gold);">Base: ₹<span id="p-base"></span> L</h3>
    </div>
    <div style="display:flex; justify-content:space-between; padding:20px;">
        <div style="text-align:left;">Bidder: <span id="c-bidder">None</span><br><b>₹<span id="c-bid">0</span> L</b></div>
        <div id="timer" style="font-size:3em; color:var(--neon-red);">15</div>
    </div>
    <button id="bid-btn" style="width:100%; font-size:1.5em;">PLACE BID</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io(); let room = ""; let isHost = false;
    const screens = { home: document.getElementById('home-screen'), auction: document.getElementById('auction-screen') };

    document.getElementById('create-btn').onclick = () => socket.emit('createRoom', { startingPurse: document.getElementById('purse-input').value, format: document.getElementById('format-select').value });
    document.getElementById('join-btn').onclick = () => socket.emit('joinRoom', document.getElementById('join-input').value.toUpperCase());
    document.getElementById('bid-btn').onclick = () => socket.emit('placeBid', room);
    document.getElementById('pause-btn').onclick = () => socket.emit('pauseAuction', room);
    document.getElementById('resume-btn').onclick = () => socket.emit('resumeAuction', room);
    document.getElementById('undo-btn').onclick = () => socket.emit('undoBid', room);

    socket.on('roomCreated', d => { room = d.code; isHost = true; screens.home.classList.add('hidden'); screens.auction.classList.remove('hidden'); document.getElementById('host-controls').classList.remove('hidden'); document.getElementById('nav-stats').classList.remove('hidden'); document.getElementById('nav-code').innerText = room; document.getElementById('nav-purse').innerText = d.purse; socket.emit('startAuction', room); });
    socket.on('roomJoined', d => { room = d.code; screens.home.classList.add('hidden'); screens.auction.classList.remove('hidden'); document.getElementById('nav-stats').classList.remove('hidden'); document.getElementById('nav-code').innerText = room; document.getElementById('nav-purse').innerText = d.purse; });

    socket.on('newPlayerUp', d => {
        document.getElementById('p-name').innerText = d.player.name; document.getElementById('p-info').innerText = `${d.player.role} | ${d.player.country}`; document.getElementById('p-base').innerText = d.player.basePrice;
        document.getElementById('c-bid').innerText = d.player.basePrice; document.getElementById('c-bidder').innerText = "None";
        const img = document.getElementById('player-img'); const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(d.player.name)}&background=D4AF37&color=000&bold=true`;
        img.src = d.player.image || avatar; img.onerror = () => { img.src = avatar; };
        document.getElementById('timer').style.color = 'var(--neon-red)';
    });

    socket.on('timerUpdate', t => document.getElementById('timer').innerText = t);
    socket.on('bidUpdated', d => { document.getElementById('c-bid').innerText = d.bidAmount; document.getElementById('c-bidder').innerText = d.bidderName; });
    socket.on('auctionPaused', () => { document.getElementById('timer').innerText = "PAUSED"; document.getElementById('pause-btn').classList.add('hidden'); document.getElementById('resume-btn').classList.remove('hidden'); });
    socket.on('auctionResumed', () => { document.getElementById('pause-btn').classList.remove('hidden'); document.getElementById('resume-btn').classList.add('hidden'); });
</script>
</body>
</html>
