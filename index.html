<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #080808; --card-bg: #151515; --gold: #D4AF37; --neon-red: #ff073a; --text-main: #f8fafc; --safe-green: #10b981; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 75px 10px 20px 10px; overflow-x: hidden; }

        /* NAVBAR & PURSE */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 65px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 2000; }
        .purse-container { width: 120px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .purse-filler { width: 100%; height: 100%; background: var(--gold); transition: width 0.5s ease; }

        /* SPY MENU */
        .spy-menu { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: #111; z-index: 3000; transition: 0.3s; padding: 20px; border-left: 2px solid var(--gold); box-shadow: -10px 0 30px rgba(0,0,0,0.8); overflow-y: auto; }
        .spy-menu.active { right: 0; }
        .spy-close { font-size: 2em; color: var(--gold); cursor: pointer; float: right; }

        .container { width: 100%; max-width: 500px; margin: 0 auto 15px auto; background: var(--card-bg); padding: 15px; border-radius: 12px; border-top: 3px solid var(--neon-red); box-sizing: border-box; position: relative; }

        /* AI SCOUT */
        .scout-box { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold); padding: 8px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8em; display: flex; align-items: center; gap: 10px; }
        .scout-tag { font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-size: 0.75em; }

        /* PLAYER CARD */
        .player-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .player-avatar { width: 80px; height: 80px; border-radius: 10px; border: 2px solid var(--gold); object-fit: cover; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; text-align: center; }

        /* SQUAD SECTION (Restored) */
        .squad-section { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; text-align: left; }
        .squad-list { max-height: 80px; overflow-y: auto; font-size: 0.85em; padding: 0; margin: 5px 0; list-style: none; }

        /* CHAT SECTION (Restored) */
        .chat-section { background: #000; border-radius: 8px; padding: 8px; border: 1px solid #333; margin-top: 10px; }
        #chat-messages { height: 70px; overflow-y: auto; text-align: left; font-size: 0.8em; margin-bottom: 5px; color: #ccc; }

        .bid-btn { height: 60px; font-size: 1.3em; background: linear-gradient(180deg, var(--gold), #8a6d1a); color: #000; border: none; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .bid-btn:active { transform: scale(0.96); }

        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="text-align: left;">
        <div style="color:var(--gold); font-weight:800; font-size: 0.9em;">🏏 ₹<span id="nav-purse">100</span> Cr</div>
        <div class="purse-container"><div id="purse-bar" class="purse-filler"></div></div>
    </div>
    <div onclick="toggleSpy()" style="color:var(--gold); font-size: 1.5em; cursor: pointer;">📊</div>
</nav>

<div id="spy-menu" class="spy-menu">
    <span class="spy-close" onclick="toggleSpy()">×</span>
    <h2 style="color:var(--gold); margin-top:0;">LEAGUE TRACKER</h2>
    <div id="spy-list"></div>
</div>

<div class="container" id="home-screen">
    <h1 style="font-size: 1.5em; text-align:center;">SELECT FORMAT</h1>
    <select id="format-select">
        <option value="T20">T20 Mega Auction</option>
        <option value="ODI">ODI World Cup</option>
        <option value="Test">Test Championship</option>
    </select>
    <input type="number" id="purse-input" value="100">
    <button onclick="createGame()" style="width:100%; background:var(--gold); padding:15px; border-radius:8px; font-weight:800; color:#000; border:none;">CREATE LOBBY</button>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <input type="text" id="join-input" placeholder="CODE" style="margin:0;">
        <button onclick="joinGame()" style="width:80px; background:#fff; color:#000; margin:0; border:none; border-radius:5px; font-weight:bold;">JOIN</button>
    </div>
</div>

<div class="container hidden" id="auction-screen">
    
    <div class="scout-box">
        <div id="scout-tag" class="scout-tag" style="background: var(--gold); color: #000;">SCOUT</div>
        <div id="scout-msg" style="line-height: 1.2;">Waiting for player...</div>
    </div>

    <div class="player-card">
        <img id="p-img" class="player-avatar" src="" referrerpolicy="no-referrer">
        <div style="text-align: left;">
            <h2 id="p-name" style="margin:0; font-size: 1.2em; text-transform: uppercase;"></h2>
            <div id="p-info" style="color:var(--text-muted); font-size: 0.8em; margin: 3px 0;"></div>
            <div style="color: var(--gold); font-weight: 800;">BASE: ₹<span id="p-base"></span>L</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-box" style="text-align:left;">
            <small style="color:var(--text-muted)">CURRENT BID</small><br>
            <span style="font-size: 1.3em; font-weight: 800; color: var(--gold);">₹<span id="c-bid">0</span>L</span><br>
            <small id="c-bidder" style="color: #fff;">None</small>
        </div>
        <div class="stat-box" style="display:flex; align-items:center; justify-content:center;">
            <div id="timer" style="font-size: 2.8em; font-weight: 900; color: var(--neon-red);">15</div>
        </div>
    </div>

    <div class="squad-section">
        <small style="color:var(--gold); font-weight:700;">📋 MY SQUAD (<span id="squad-count">0</span>)</small>
        <ul class="squad-list" id="my-squad-list">
            <li style="color:#444;">No players bought yet...</li>
        </ul>
    </div>

    <button id="bid-btn" class="bid-btn">PLACE BID</button>

    <div class="chat-section">
        <div id="chat-messages"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" placeholder="Comms..." style="margin:0; height:35px; padding:5px;">
            <button id="send-btn" style="width:60px; margin:0; padding:0; height:35px; background:var(--gold); color:#000; border:none; font-weight:bold; border-radius:5px;">Send</button>
        </div>
    </div>
</div>

<audio id="sfx-bid" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
<audio id="sfx-sold" src="https://assets.mixkit.co/active_storage/sfx/1085/1085-preview.mp3" preload="auto"></audio>
<audio id="sfx-tick" src="https://assets.mixkit.co/active_storage/sfx/2558/2558-preview.mp3" preload="auto"></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();
    let room = ""; let initialPurse = 100; let currentHiddenRating = 0;

    // Fixed Audio Function
    function playSfx(id) { 
        const a = document.getElementById(id); 
        a.currentTime = 0; 
        let playPromise = a.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => { console.log("Audio waiting for user tap."); });
        }
    }

    function toggleSpy() { document.getElementById('spy-menu').classList.toggle('active'); }

    function createGame() {
        initialPurse = document.getElementById('purse-input').value;
        socket.emit('createRoom', { startingPurse: initialPurse, format: document.getElementById('format-select').value });
    }

    function joinGame() { socket.emit('joinRoom', document.getElementById('join-input').value.toUpperCase()); }

    socket.on('roomCreated', d => { 
        room = d.code; 
        document.getElementById('home-screen').classList.add('hidden'); 
        document.getElementById('auction-screen').classList.remove('hidden');
        socket.emit('startAuction', room);
    });

    socket.on('roomJoined', d => { 
        room = d.code; 
        document.getElementById('home-screen').classList.add('hidden'); 
        document.getElementById('auction-screen').classList.remove('hidden');
    });

    socket.on('newPlayerUp', d => {
        currentHiddenRating = d.player.hiddenRating;
        document.getElementById('p-name').innerText = d.player.name;
        document.getElementById('p-base').innerText = d.player.basePrice;
        document.getElementById('p-info').innerText = `${d.player.role} | ${d.player.country}`;
        document.getElementById('c-bid').innerText = d.player.basePrice;
        document.getElementById('c-bidder').innerText = "None";
        document.getElementById('timer').style.color = "var(--neon-red)";
        
        document.getElementById('scout-tag').innerText = "WATCHING";
        document.getElementById('scout-tag').style.background = "var(--gold)";
        document.getElementById('scout-msg').innerText = "Awaiting bids...";
        
        const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(d.player.name)}&background=D4AF37&color=000&bold=true`;
        document.getElementById('p-img').src = d.player.image || avatar;
        document.getElementById('p-img').onerror = function() { this.src = avatar; };
    });

    document.getElementById('bid-btn').onclick = () => { socket.emit('placeBid', room); playSfx('sfx-bid'); };

    socket.on('bidUpdated', d => {
        document.getElementById('c-bid').innerText = d.bidAmount;
        document.getElementById('c-bidder').innerText = d.bidderName;
        playSfx('sfx-bid');

        const valueRatio = (d.bidAmount / currentHiddenRating);
        const scoutTag = document.getElementById('scout-tag');
        const scoutMsg = document.getElementById('scout-msg');

        if(valueRatio < 1.5) { scoutTag.innerText = "STEAL"; scoutTag.style.background = "var(--safe-green)"; scoutMsg.innerText = "Excellent value."; }
        else if(valueRatio < 3.5) { scoutTag.innerText = "FAIR"; scoutTag.style.background = "var(--gold)"; scoutMsg.innerText = "Price is getting high."; }
        else { scoutTag.innerText = "OVERPAID"; scoutTag.style.background = "var(--neon-red)"; scoutMsg.innerText = "Warning: Too expensive!"; }
    });

    socket.on('timerUpdate', t => {
        document.getElementById('timer').innerText = t;
        if(t <= 5 && t > 0) { playSfx('sfx-tick'); document.getElementById('timer').style.color = "var(--gold)"; }
    });

    socket.on('playerSold', d => {
        playSfx('sfx-sold');
        const me = d.users.find(u => u.id === socket.id);
        if(me) {
            // Update Top Navbar Purse
            const perc = (me.purseRemaining / initialPurse) * 100;
            document.getElementById('purse-bar').style.width = perc + "%";
            document.getElementById('nav-purse').innerText = me.purseRemaining.toFixed(2);

            // Update Restored Squad List
            document.getElementById('squad-count').innerText = me.squad.length;
            const list = document.getElementById('my-squad-list');
            list.innerHTML = '';
            me.squad.forEach(p => {
                list.innerHTML += `<li style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #222;"><span>🏏 ${p.name}</span><span style="color:var(--gold)">₹${p.basePrice}L</span></li>`;
            });
        }

        // Update Spy Menu
        const spyList = document.getElementById('spy-list');
        spyList.innerHTML = '';
        d.users.forEach(u => {
            spyList.innerHTML += `
                <div style="border-bottom:1px solid #333; padding:10px 0;">
                    <b style="color:var(--gold)">${u.name}</b><br>
                    <small>Purse: ₹${u.purseRemaining.toFixed(2)} Cr</small><br>
                    <small style="color:var(--text-muted)">Squad: ${u.squad.length} players</small>
                </div>`;
        });
    });

    socket.on('playerUnsold', () => { document.getElementById('p-name').innerText = "UNSOLD"; });

    // Restored Chat Logic
    document.getElementById('send-btn').onclick = () => {
        const msg = document.getElementById('chat-input').value;
        if(msg) { socket.emit('sendChatMessage', { roomCode: room, message: msg }); document.getElementById('chat-input').value = ''; }
    };

    socket.on('receiveChatMessage', d => { 
        const box = document.getElementById('chat-messages');
        box.innerHTML += `<div><b style="color:var(--gold)">${d.sender}:</b> ${d.message}</div>`;
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
