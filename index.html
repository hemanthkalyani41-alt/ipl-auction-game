<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #080808; --card-bg: #151515; --gold: #D4AF37; --neon-red: #ff073a; --text-main: #f8fafc; --safe-green: #10b981; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 75px 10px 20px 10px; overflow-x: hidden; }

        /* THE PREMIUM NAVBAR */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 65px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 2000; }
        
        /* LIVE PURSE BAR */
        .purse-container { width: 120px; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .purse-filler { width: 100%; height: 100%; background: var(--gold); transition: width 0.5s ease; }

        /* SPY DRAWER (Nav Menu) */
        .spy-menu { position: fixed; top: 0; right: -280px; width: 260px; height: 100%; background: #111; z-index: 3000; transition: 0.3s; padding: 20px; border-left: 2px solid var(--gold); box-shadow: -10px 0 30px rgba(0,0,0,0.8); overflow-y: auto; }
        .spy-menu.active { right: 0; }
        .spy-close { font-size: 2em; color: var(--gold); cursor: pointer; float: right; }

        /* AI SCOUT BOX */
        .scout-box { background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85em; display: flex; align-items: center; gap: 10px; }
        .scout-tag { font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-size: 0.7em; }

        .container { width: 100%; max-width: 500px; margin: 0 auto 15px auto; background: var(--card-bg); padding: 20px; border-radius: 12px; border-top: 3px solid var(--neon-red); box-sizing: border-box; position: relative; }

        .player-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 10px; transition: 0.3s; }
        .player-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; }
        
        .bid-btn { height: 65px; font-size: 1.3em; background: linear-gradient(180deg, var(--gold), #8a6d1a); color: #000; border: none; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .bid-btn:active { transform: scale(0.96); }
        .bid-btn.disabled { filter: grayscale(1); opacity: 0.5; pointer-events: none; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="text-align: left;">
        <div style="color:var(--gold); font-weight:800; font-size: 0.9em;">MY FRANCHISE</div>
        <div class="purse-container"><div id="purse-bar" class="purse-filler"></div></div>
    </div>
    <div onclick="toggleSpy()" style="color:var(--gold); font-size: 1.5em; cursor: pointer;">📊</div>
</nav>

<div id="spy-menu" class="spy-menu">
    <span class="spy-close" onclick="toggleSpy()">×</span>
    <h2 style="color:var(--gold)">LEAGUE TRACKER</h2>
    <div id="spy-list"></div>
</div>

<div class="container" id="home-screen">
    <h1 style="font-size: 1.5em;">SELECT FORMAT</h1>
    <select id="format-select" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #444; margin-bottom:10px;">
        <option value="T20">T20 Mega Auction</option>
        <option value="ODI">ODI World Cup</option>
        <option value="Test">Test Championship</option>
    </select>
    <input type="number" id="purse-input" value="100" style="width:100%; padding:12px; background:#222; color:#fff; border:1px solid #444;">
    <button onclick="createGame()" style="width:100%; background:var(--gold); padding:15px; border-radius:8px; font-weight:800; margin-top:15px;">CREATE LOBBY</button>
    <div style="margin-top:20px;">
        <input type="text" id="join-input" placeholder="CODE" style="width:60%; padding:10px;">
        <button onclick="joinGame()" style="width:35%; background:#fff; color:#000; padding:10px; font-weight:800;">JOIN</button>
    </div>
</div>

<div class="container hidden" id="auction-screen">
    <div class="scout-box">
        <div id="scout-tag" class="scout-tag" style="background: var(--gold); color: #000;">Analysing...</div>
        <div id="scout-msg" style="line-height: 1.2;">Waiting for first bid...</div>
    </div>

    <div class="player-card" id="card-main">
        <img id="p-img" class="player-avatar" src="" referrerpolicy="no-referrer">
        <h2 id="p-name" style="margin:5px 0; letter-spacing: 1px;"></h2>
        <div id="p-info" style="color:var(--text-muted); font-size: 0.8em; margin-bottom: 10px;"></div>
        <div style="font-size: 1.1em; color: var(--gold); font-weight: 800;">BASE: ₹<span id="p-base"></span>L</div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-box">
            <small style="color:var(--text-muted)">CURRENT BID</small><br>
            <span style="font-size: 1.3em; font-weight: 800; color: var(--gold);">₹<span id="c-bid">0</span>L</span><br>
            <small id="c-bidder" style="color: #fff;">None</small>
        </div>
        <div class="stat-box" style="display:flex; align-items:center; justify-content:center;">
            <div id="timer" style="font-size: 2.8em; font-weight: 900; color: var(--neon-red);">15</div>
        </div>
    </div>

    <button id="bid-btn" class="bid-btn">PLACE BID</button>

    <div style="margin-top: 15px; text-align: left; font-size: 0.8em; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #222;">
        <span style="color:var(--gold)">MY SQUAD:</span> <span id="squad-list-inline">None</span>
    </div>
</div>

<audio id="sfx-bid" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="sfx-sold" src="https://www.myinstants.com/media/sounds/ipl-auction.mp3"></audio>
<audio id="sfx-tick" src="https://www.soundjay.com/clock/sounds/clock-ticking-2.mp3"></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();
    let room = ""; let initialPurse = 100; let currentHiddenRating = 0;

    function playSfx(id) { 
        const a = document.getElementById(id); a.currentTime = 0; 
        a.play().catch(() => {}); 
    }

    function toggleSpy() { document.getElementById('spy-menu').classList.toggle('active'); }

    function createGame() {
        initialPurse = document.getElementById('purse-input').value;
        socket.emit('createRoom', { startingPurse: initialPurse, format: document.getElementById('format-select').value });
    }

    function joinGame() { socket.emit('joinRoom', document.getElementById('join-input').value.toUpperCase()); }

    socket.on('roomCreated', d => { 
        room = d.code; 
        document.getElementById('home-screen').classList.add('hidden'); 
        document.getElementById('auction-screen').classList.remove('hidden');
        socket.emit('startAuction', room);
    });

    socket.on('roomJoined', d => { 
        room = d.code; 
        document.getElementById('home-screen').classList.add('hidden'); 
        document.getElementById('auction-screen').classList.remove('hidden');
    });

    socket.on('newPlayerUp', d => {
        currentHiddenRating = d.player.hiddenRating;
        document.getElementById('p-name').innerText = d.player.name;
        document.getElementById('p-base').innerText = d.player.basePrice;
        document.getElementById('p-info').innerText = `${d.player.role} | ${d.player.country}`;
        document.getElementById('c-bid').innerText = d.player.basePrice;
        document.getElementById('c-bidder').innerText = "None";
        document.getElementById('timer').style.color = "var(--neon-red)";
        
        // AI Scout Reset
        document.getElementById('scout-tag').innerText = "WATCHING";
        document.getElementById('scout-msg').innerText = "New player on the block. Waiting for interest.";
        
        const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(d.player.name)}&background=D4AF37&color=000&bold=true`;
        document.getElementById('p-img').src = d.player.image || avatar;
    });

    document.getElementById('bid-btn').onclick = () => { socket.emit('placeBid', room); playSfx('sfx-bid'); };

    socket.on('bidUpdated', d => {
        document.getElementById('c-bid').innerText = d.bidAmount;
        document.getElementById('c-bidder').innerText = d.bidderName;
        playSfx('sfx-bid');

        // AI SCOUT LOGIC
        const scoutTag = document.getElementById('scout-tag');
        const scoutMsg = document.getElementById('scout-msg');
        const valueRatio = (d.bidAmount / currentHiddenRating);

        if(valueRatio < 1.5) { scoutTag.innerText = "STEAL"; scoutTag.style.background = "var(--safe-green)"; scoutMsg.innerText = "Exceptional value. Keep bidding!"; }
        else if(valueRatio < 3.5) { scoutTag.innerText = "FAIR"; scoutTag.style.background = "var(--gold)"; scoutMsg.innerText = "Price is rising, but he's worth the star power."; }
        else { scoutTag.innerText = "OVERPAID"; scoutTag.style.background = "var(--neon-red)"; scoutMsg.innerText = "Warning: You're burning too much purse here!"; }
    });

    socket.on('timerUpdate', t => {
        document.getElementById('timer').innerText = t;
        if(t <= 5 && t > 0) { playSfx('sfx-tick'); document.getElementById('timer').style.color = "var(--gold)"; }
    });

    socket.on('playerSold', d => {
        playSfx('sfx-sold');
        const me = d.users.find(u => u.id === socket.id);
        if(me) {
            // Update Purse Bar
            const perc = (me.purseRemaining / initialPurse) * 100;
            document.getElementById('purse-bar').style.width = perc + "%";
            document.getElementById('squad-list-inline').innerText = me.squad.map(p => p.name).join(", ");
        }

        // Update Spy Menu
        const spyList = document.getElementById('spy-list');
        spyList.innerHTML = '';
        d.users.forEach(u => {
            spyList.innerHTML += `
                <div style="border-bottom:1px solid #333; padding:10px 0;">
                    <b style="color:var(--gold)">${u.name}</b><br>
                    <small>Purse: ₹${u.purseRemaining.toFixed(2)} Cr</small><br>
                    <small style="color:var(--text-muted)">Squad: ${u.squad.length} players</small>
                </div>`;
        });
    });

    socket.on('receiveChatMessage', d => { playSfx('sfx-bid'); }); // Subtle sound for chat
</script>
</body>
</html>
